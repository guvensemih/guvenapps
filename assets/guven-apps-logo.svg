<svg xmlns="http://www.w3.org/2000/svg"
     width="760"
     height="200"
     viewBox="0 0 760 200"
     role="img"
     aria-labelledby="logoTitle logoDescription">

  <title id="logoTitle">Güven Apps logosu</title>

  <desc id="logoDescription">
    Koyu lacivert ve teal renklerde, yuvarlatılmış bir kalkan ve konuşma balonunu
    çağrıştıran stilize G simgesi. Simgenin içinde Braille hücresini temsil eden
    altı nokta bulunur. Sağında Güven Apps, altında Erişilebilir Android
    uygulamaları yazısı yer alır.
  </desc>

